<!DOCTYPE html>
<html>
<head>
    <title>Researcher Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h2>CTMS</h2>
    <a href="researcher_medication.html">Administrating Medication</a>
    <a href="record_observation.html">Record Observation</a>
    <a href="submit_final_report.html">Final Report</a>
    <a href="trials.html">Trials</a>
    <a href="reports.html">Reports</a>

</div>

<div class="main">

    <div class="topbar">
        <h1>Researcher Dashboard</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <div class="card">
        <h2>Your Trials & Participants</h2>

        <table>
            <thead>
                <tr>
                    <th>Trial</th>
                    <th>Phase</th>
                    <th>Participant</th>
                    <th>Status</th>
                </tr>
            </thead>

            <!-- ✅ FIXED ID -->
            <tbody id="researcher-table"></tbody>
        </table>
    </div>

    <div class="card">
    <h2>Reported Side Effects</h2>

    <table>
        <thead>
            <tr>
                <th>Participant</th>
                <th>Trial</th>
                <th>Effect</th>
                <th>Severity</th>
                <th>Duration</th>
            </tr>
        </thead>
        <tbody id="researcherEffects"></tbody>
    </table>
</div>

    <div class="card">
        <h2>Eligibility Criteria</h2>

        <input id="eTrial" placeholder="Trial ID">
        <input id="minAge" placeholder="Min Age">
        <input id="maxAge" placeholder="Max Age">
        <input id="condition" placeholder="Condition">

        <textarea id="exclusions" placeholder="Exclusions"></textarea>

        <button class="btn primary" onclick="addCriteria()">Save</button>
</div>

</div>


<!-- ✅ ONLY THIS SCRIPT -->
<script src="js/main.js"></script>

<!-- ✅ CALL FUNCTION -->
<script>
    loadResearcherDashboard();
    loadResearcherEffects();
</script>

</body>
</html>
