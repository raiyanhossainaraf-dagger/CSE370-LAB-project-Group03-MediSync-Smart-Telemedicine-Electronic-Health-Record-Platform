<!DOCTYPE html>
<html>
<head>
    <title>Participant Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h2>CTMS</h2>
    <a href="participant_dashboard.html" class="active">Dashboard</a>
    <a href="apply_trial.html">Apply Trial</a>
    <a href="visit_schedule.html">Visit Schedule</a>
    <a href="report_symptoms.html">Report Symptoms</a>
    <a href="trials.html">Trials</a>
    <a href="reports.html">Reports</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Participant Dashboard</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <!-- ENROLLMENTS -->
    <div class="card">
        <h2>Your Enrollments</h2>

        <table>
            <thead>
                <tr>
                    <th>Trial</th>
                    <th>Phase</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="participant-table"></tbody>
        </table>
    </div>

    <!-- MEDICATION -->
    <div class="card">
        <h2>Your Medications</h2>

        <table>
            <thead>
                <tr>
                    <th>Drug</th>
                    <th>Dosage</th>
                    <th>Frequency</th>
                </tr>
            </thead>
            <tbody id="medicationTable"></tbody>
        </table>
    </div>

</div>

<script src="js/main.js"></script>

<script>
    loadParticipantDashboard();
    loadMedications();
</script>

</body>
</html>
