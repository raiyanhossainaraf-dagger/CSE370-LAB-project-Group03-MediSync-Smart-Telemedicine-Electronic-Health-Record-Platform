<!DOCTYPE html>
<html>
<head>
    <title>Administrating Medication</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CTMS</h2>
    <a href="researcher_dashboard.html">Dashboard</a>
    <a href="researcher_medication.html" class="active">Administrating Medication</a>
    <a href="record_observation.html">Record Observation</a>
    <a href="submit_final_report.html">Final Report</a>
    <a href="reports.html">Reports</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h1>Administrating Medication</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <!-- CENTERED FORM -->
    <div class="form-container">

        <div class="form-card">
            <h2>Add Medication</h2>

            <label>Trial ID</label>
            <input id="med_trial" placeholder="Enter Trial ID">

            <label>Drug Name</label>
            <input id="med_name" placeholder="Enter drug name">

            <label>Dosage</label>
            <input id="med_dosage" placeholder="e.g. 500mg">

            <label>Frequency</label>
            <input id="med_frequency" placeholder="e.g. Twice daily">

            <button class="btn" onclick="addMedication()">Add Medication</button>
        </div>

    </div>

    <!-- MEDICATION LIST -->
    <div class="card">
        <h2>Assigned Medications</h2>

        <table>
            <thead>
                <tr>
                    <th>Trial</th>
                    <th>Drug</th>
                    <th>Dosage</th>
                    <th>Frequency</th>
                </tr>
            </thead>

            <tbody id="medicationList"></tbody>
        </table>
    </div>

</div>

<script src="js/main.js"></script>

<script>
    loadResearcherMedications(); // optional (if you implement backend)
</script>

</body>
</html>
