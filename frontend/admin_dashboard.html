<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>CTMS</h2>
    <a href="admin_dashboard.html" class="active">Dashboard</a>
    <a href="create_trial.html">Create Trial</a>
    <a href="trials.html">Trials</a>
    <a href="reports.html">Reports</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h1>Admin Dashboard</h1>
        <div>
            <input id="searchInput" type="text" placeholder="Search..." style="padding:6px;">
            <button class="btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="cards">
        <div class="stat-card">
            <h3>Participants</h3>
            <p id="totalParticipants">0</p>
        </div>

        <div class="stat-card">
            <h3>Trials</h3>
            <p id="totalTrials">0</p>
        </div>

        <div class="stat-card">
            <h3>Approved</h3>
            <p id="approvedCount">0</p>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h2>Enrollment Overview</h2>

        <table>
            <thead>
                <tr>
                    <th>Participant</th>
                    <th>Trial</th>
                    <th>Phase</th>
                    <th>Status</th>
                    <th>Researcher</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                <!-- Data loads dynamically -->
            </tbody>
        </table>
    </div>

</div>

<!-- SCRIPTS -->
<script src="js/main.js"></script>

<script>
    // Load data
    loadAdminDashboard();

    // 🔍 Simple search filter
    document.getElementById("searchInput").addEventListener("input", function () {
        const value = this.value.toLowerCase();
        const rows = document.querySelectorAll("#tableBody tr");

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(value) ? "" : "none";
        });
    });
</script>

</body>
</html>
